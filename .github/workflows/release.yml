name: Release binaries

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[loc]" pyinstaller

      - name: Build single binary
        working-directory: python
        run: pyinstaller hdb_extract.spec --clean --noconfirm

      - name: Smoke-test the package
        working-directory: python
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./dist/hdb-extract.exe --version
          else
            ./dist/hdb-extract --version
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hdb-extract-${{ matrix.os }}
          path: python/dist/hdb-extract*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Stage release assets
        run: |
          mkdir -p staged
          for d in artifacts/hdb-extract-*; do
            os=$(basename "$d" | sed 's/^hdb-extract-//')
            for f in "$d"/*; do
              ext="${f##*.}"
              if [ "$ext" = "exe" ]; then
                cp "$f" "staged/hdb-extract-${os}.exe"
              else
                cp "$f" "staged/hdb-extract-${os}"
                chmod +x "staged/hdb-extract-${os}"
              fi
            done
          done
          ls -la staged/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: staged/*
          generate_release_notes: true
