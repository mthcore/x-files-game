name: Docs

on:
  push:
    branches: [main]
    paths:
      - "**.md"
  pull_request:
    branches: [main]
    paths:
      - "**.md"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !cpp/third_party/**
        continue-on-error: true

      - name: Link check
        uses: lycheeverse/lychee-action@v1
        with:
          args: --no-progress --exclude-mail '**/*.md'
        continue-on-error: true
